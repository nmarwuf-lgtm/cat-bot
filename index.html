<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مساعد أساسيات التمريض</title>
<style>
body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
.container { max-width: 800px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
input, button { padding: 10px; font-size:16px; width:100%; margin:5px 0; }
.result { margin-top:20px; padding:15px; background:#e0f7fa; border-radius:8px; line-height:1.6;}
h3{margin-bottom:5px;}
.point{margin-bottom:10px;}
.example{background:#fff9c4; padding:8px; border-radius:5px; margin:5px 0;}
</style>
</head>
<body>

<div class="container">
<h2>مساعد أساسيات التمريض</h2>
<input type="text" id="searchInput" placeholder="اكتب كلمة أو سؤال هنا...">
<button onclick="searchTerm()">ابحث</button>
<div class="result" id="result"></div>
</div>

<script src="data.js"></script>
<script>
function searchTerm(){
  const term=document.getElementById('searchInput').value.trim().toLowerCase();
  const resultDiv=document.getElementById('result');
  let found=false;
  resultDiv.innerHTML="";

  for(const ch in data.chapters){
    const chapter=data.chapters[ch];

    // بحث في المصطلحات
    for(const key in chapter.glossary){
      const g=chapter.glossary[key];
      if(key.toLowerCase()===term || g.formal_explanation.toLowerCase().includes(term) || g.casual_explanation.toLowerCase().includes(term)){
        resultDiv.innerHTML+=`<h3>الكلمة: ${key}</h3>
        <strong>الترجمة:</strong> ${g.translation_ar}<br>
        <strong>النطق:</strong> ${g.pronunciation}<br>
        <strong>شرح رسمي:</strong> ${g.formal_explanation}<br>
        <strong>شرح عامية:</strong> ${g.casual_explanation}<br>
        <div class="example"><strong>مثال:</strong> ${g.example}</div>`;
        found=true;
      }
    }

    // بحث في الأسئلة
    chapter.questions.forEach(q=>{
      if(q.question.toLowerCase().includes(term)){
        resultDiv.innerHTML+=`<h3>سؤال:</h3>${q.question}<br><strong>الجواب:</strong>${q.answer}<br>`;
        found=true;
      }
    });

    // بحث في تفاصيل الفصل
    chapter.details.forEach(d=>{
      if(d.point.toLowerCase().includes(term) || d.formal.toLowerCase().includes(term) || d.casual.toLowerCase().includes(term)){
        resultDiv.innerHTML+=`<div class="point">
        <strong>${d.point}</strong><br>
        شرح رسمي: ${d.formal}<br>
        شرح عامية: ${d.casual}
        </div>`;
        found=true;
      }
    });
  }

  if(!found){resultDiv.innerHTML="عذرًا، لم يتم العثور على المحتوى المطلوب.";}
}
</script>

</body>
</html>
